<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>こもれび平原 - Komorebi Plains</title>
<meta name="theme-color" content="#0d1430">
<meta name="description" content="プロシージャル生成の3Dオープンワールドを歩いてクリスタルを集める、ブラウザ探索ゲーム。">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🌿%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/ui.css">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div class="hud-row">
      <div class="hud-chip" id="crystalCount">💎 0</div>
      <div class="hud-chip" id="clock">☀️ 08:00</div>
      <div class="hud-chip" id="compass">北</div>
    </div>
    <div id="hint">WASD/矢印: 移動 ・ ドラッグ: 視点 ・ Space: ジャンプ ・ Shift: ダッシュ</div>
  </div>

  <div id="banner"></div>

  <div id="joystick"><div id="stick"></div></div>
  <button id="jumpBtn">⤴</button>

  <div id="title">
    <div class="title-inner">
      <h1>こもれび平原</h1>
      <p class="subtitle">- Komorebi Plains -</p>
      <p class="desc">はてしない丘をあるき、ひかるクリスタルをあつめよう</p>
      <button id="continueBtn" class="hidden">つづきから</button>
      <button id="startBtn">はじめから</button>
    </div>
  </div>

  <div id="errToast"></div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
